<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>T-Shaped | Designer Profile Mapper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/tippy.js@6.3.7/dist/tippy.css"
      crossorigin="anonymous"
    />
  </head>
  <body class="dark">
    <div id="root"></div>

    <template id="step1-template">
      <div class="card card--start">
        <h2>Ready to map your designer shape?</h2>
        <div class="start-name-field">
          <label for="start-name" class="start-name-label">Name (Optional)</label>
          <input
            type="text"
            id="start-name"
            class="start-name-input"
            name="userName"
            autocomplete="given-name"
            placeholder="e.g. Alex"
            maxlength="80"
          />
        </div>
        <div class="start-name-field">
          <label for="start-email" class="start-name-label">Email (Optional)</label>
          <input
            type="email"
            id="start-email"
            class="start-name-input"
            name="userEmail"
            autocomplete="email"
            placeholder="e.g. alex@domain.com"
            maxlength="120"
          />
          <p class="start-email-note muted">
            Used only to email your shape map files to you. Will not be added to email list.
          </p>
        </div>
        <div class="actions">
          <button type="button" data-action="start" class="btn btn-primary">Start</button>
        </div>
      </div>
    </template>

    <template id="step2-template">
      <div class="card">
        <h2>Do you identify as a generalist or specialist?</h2>
        <p class="muted">This determines your selection cap and ranking distribution.</p>
        <div class="stack">
          <label class="selectable">
            <input type="radio" name="profileType" value="generalist" />
            <span>
              <strong>Generalist</strong>
              <small>Up to 12 selected items</small>
            </span>
          </label>
          <label class="selectable">
            <input type="radio" name="profileType" value="specialist" />
            <span>
              <strong>Specialist</strong>
              <small>Up to 6 selected items</small>
            </span>
          </label>
        </div>
        <div class="actions">
          <button data-action="to-step-3">Continue</button>
        </div>
      </div>
    </template>

    <template id="step3-template">
      <div class="card card--scrollable">
        <div class="card-title-row">
          <h2>Select skills & specialties</h2>
          <div class="card-title-actions" role="group" aria-label="Selection helpers">
            <button
              type="button"
              class="secondary"
              data-action="selection-random"
              data-tippy-content="Fill selection at random (up to your cap)"
              aria-label="Fill selection at random (up to your cap)"
            >
              Random
            </button>
            <button
              type="button"
              class="icon-btn"
              data-action="selection-reset"
              data-tippy-content="Clear all selections"
              aria-label="Clear all selections"
            >
              ⟲
            </button>
          </div>
        </div>
        <p class="muted" id="selection-cap"></p>
        <div class="scroll-panel scroll-panel--main" id="selection-scroll">
          <div class="selection-grid">
            <div>
              <h3>Design Categories</h3>
              <div id="categories-list" class="option-list"></div>
            </div>
            <div>
              <h3>Specializations</h3>
              <div id="specializations-list" class="option-list"></div>
            </div>
          </div>
        </div>
        <div class="selected-summary" id="selected-summary"></div>
        <div class="actions">
          <button data-action="to-step-4">Continue</button>
        </div>
      </div>
    </template>

    <template id="step4-template">
      <div class="card card--scrollable">
        <h2>Rate each selection</h2>
        <p class="muted">
          Use the horizontal thermometer (0–10). Ranks 1–7 are unlimited; only
          <strong>one</strong> skill in your whole profile may be 8, one may be 9, and one may be 10. See
          the key for 8/9/10.
        </p>
        <div class="rating-layout">
          <div class="rating-col">
            <h3>Your selected items</h3>
            <div class="scroll-panel scroll-panel--main" id="rate-items-scroll">
              <div id="selected-items" class="slider-zone-list"></div>
            </div>
          </div>
        </div>
        <div class="actions">
          <button type="button" class="secondary" data-action="rate-all">Rate All</button>
          <label
            class="rate-all-preset-wrap"
            for="rate-all-preset"
            data-tippy-content="Preset used with Rate All: balanced, top-heavy, or random within quota rules"
          >
            <span class="rate-all-preset-label">Preset</span>
            <select id="rate-all-preset" class="rate-all-preset" aria-label="Rate all preset">
              <option value="balanced">Balanced</option>
              <option value="top-heavy">Top-heavy</option>
              <option value="random-valid">Random valid</option>
            </select>
          </label>
          <button
            type="button"
            class="icon-btn"
            data-action="rate-start-over"
            data-tippy-content="Clear all scores"
            aria-label="Clear all scores"
          >
            ⟲
          </button>
          <button data-action="to-step-5">See your shape</button>
        </div>
      </div>
    </template>

    <template id="step5-template">
      <div class="shape-results-stack">
        <div class="card">
          <h2 id="shape-result-title">Your designer shape</h2>
          <p class="muted" id="shape-result-sub">Bars use your ranking colors (top-aligned).</p>
          <div class="shape-toolbar">
            <label class="shape-toggle" for="shape-viz-toggle" aria-label="Show Labels or Key">
              <span class="shape-toggle__label">Labels</span>
              <span class="shape-toggle__track">
                <input type="checkbox" id="shape-viz-toggle" data-action="shape-viz-toggle" />
                <span class="shape-toggle__thumb" aria-hidden="true"></span>
              </span>
              <span class="shape-toggle__label">Key</span>
            </label>
          </div>
          <div class="shape-viz-outer" id="shape-viz-outer">
            <div class="viz-wrap">
              <svg id="t-shape-svg" viewBox="0 0 900 560" role="img" aria-label="Designer shape profile"></svg>
            </div>
            <aside class="shape-key-card" id="shape-key-card" hidden></aside>
          </div>
          <div class="shape-email-wrap">
            <label for="shape-email" class="start-name-label">Email (Optional)</label>
            <input
              type="email"
              id="shape-email"
              class="start-name-input"
              name="shapeEmail"
              autocomplete="email"
              placeholder="e.g. alex@domain.com"
              maxlength="120"
            />
            <p class="start-email-note muted">
              Add an email here if you decide to have your shape files sent later. Will not be added to
              email list.
            </p>
          </div>
          <div class="actions">
            <button data-action="start-over" class="secondary">Start Over</button>
            <button data-action="email-files" class="secondary">Email Files (ZIP)</button>
            <button data-action="download-png">Download PNG</button>
            <button data-action="download-jpeg">Download JPEG</button>
            <button data-action="download-svg">Download SVG</button>
          </div>
        </div>

        <section class="card shape-insights-card" aria-live="polite">
          <div class="shape-insights" id="shape-insights"></div>
        </section>
      </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" crossorigin="anonymous"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/tippy.js@6.3.7/dist/tippy-bundle.umd.min.js"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
