<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>T-Shaped | Designer Profile Mapper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/tippy.js@6.3.7/dist/tippy.css"
      crossorigin="anonymous"
    />
  </head>
  <body class="dark">
    <div id="root"></div>

    <template id="step1-template">
      <div class="card card--start">
        <h2>Ready to map your designer shape?</h2>
        <div class="start-name-field">
          <label for="start-name" class="start-name-label">Name (Optional)</label>
          <input
            type="text"
            id="start-name"
            class="start-name-input"
            name="userName"
            autocomplete="given-name"
            placeholder="e.g. Alex"
            maxlength="80"
          />
        </div>
        <div class="start-name-field">
          <label for="start-email" class="start-name-label">Email (Optional)</label>
          <input
            type="email"
            id="start-email"
            class="start-name-input"
            name="userEmail"
            autocomplete="email"
            placeholder="e.g. alex@domain.com"
            maxlength="120"
          />
          <p class="start-email-note muted">
            Used only to email your shape map files to you. Will not be added to email list.
          </p>
        </div>
        <div class="actions">
          <button type="button" data-action="start" class="btn btn-primary">Start</button>
        </div>
      </div>
    </template>

    <template id="step2-template">
      <div class="card">
        <h2>Do you identify as a generalist or specialist?</h2>
        <p class="muted">This determines your selection cap and ranking distribution.</p>
        <div class="stack">
          <label class="selectable">
            <input type="radio" name="profileType" value="generalist" />
            <span>
              <strong>Generalist</strong>
              <small>Select 8–12 skills</small>
            </span>
          </label>
          <label class="selectable">
            <input type="radio" name="profileType" value="specialist" />
            <span>
              <strong>Specialist</strong>
              <small>Select 5–6 skills</small>
            </span>
          </label>
        </div>
        <div class="actions">
          <button type="button" data-action="to-step-3">Continue</button>
        </div>
      </div>
    </template>

    <template id="step3-template">
      <div class="card card--scrollable">
        <div class="card-title-row">
          <h2>Select skills & specialties</h2>
          <div class="card-title-actions" role="group" aria-label="Selection helpers">
            <button
              type="button"
              class="secondary"
              data-action="selection-random"
              data-tippy-content="Pick a random valid number of skills for your profile (within the min–max range)"
              aria-label="Pick a random valid number of skills for your profile (within the min–max range)"
            >
              Random
            </button>
            <button
              type="button"
              class="secondary icon-btn"
              data-action="selection-reset"
              data-tippy-content="Clear all selections"
              aria-label="Clear all selections"
            >
              ⟲
            </button>
          </div>
        </div>
        <p class="muted" id="selection-cap"></p>
        <div class="scroll-panel scroll-panel--main" id="selection-scroll">
          <div class="selection-grid">
            <div>
              <h3>Design Categories</h3>
              <div id="categories-list" class="option-list"></div>
            </div>
            <div>
              <h3>Specializations</h3>
              <div id="specializations-list" class="option-list"></div>
            </div>
          </div>
        </div>
        <div class="selected-summary" id="selected-summary"></div>
        <div class="actions">
          <button type="button" data-action="to-step-4">Continue</button>
        </div>
      </div>
    </template>

    <template id="step4-template">
      <div class="card card--scrollable">
        <h2>Rate each selection</h2>
        <p class="muted">
          Use the horizontal thermometer (0–10). Ranks 1–7 are unlimited; only
          <strong>one</strong> skill in your whole profile may be 8, one may be 9, and one may be 10.
        </p>
        <div class="rating-layout">
          <div class="rating-col">
            <h3>Your selected items</h3>
            <div class="scroll-panel scroll-panel--main" id="rate-items-scroll">
              <div id="selected-items" class="slider-zone-list"></div>
            </div>
          </div>
        </div>
        <div class="actions">
          <button type="button" class="secondary" data-action="rate-all">Rate All</button>
          <label
            class="rate-all-preset-wrap"
            for="rate-all-preset"
            data-tippy-content="Preset used with Rate All: balanced, top-heavy, or random within quota rules"
          >
            <span class="rate-all-preset-label">Preset</span>
            <select id="rate-all-preset" class="rate-all-preset" aria-label="Rate all preset">
              <option value="balanced">Balanced</option>
              <option value="top-heavy">Top-heavy</option>
              <option value="random-valid">Random valid</option>
            </select>
          </label>
          <button
            type="button"
            class="secondary icon-btn"
            data-action="rate-start-over"
            data-tippy-content="Clear all scores"
            aria-label="Clear all scores"
          >
            ⟲
          </button>
          <button type="button" data-action="to-step-5">See your shape</button>
        </div>
      </div>
    </template>

    <template id="step5-template">
      <div class="shape-results-stack">
        <div class="card">
          <h2 id="shape-result-title">You're a T-Shaped Designer</h2>
          <div class="body-small body-small--main muted" id="shape-result-sub"></div>
          <div class="shape-result-sub-actions">
            <button type="button" class="btn-s secondary" data-action="learn-more-shape">Learn More</button>
          </div>
          <div class="chart-container" id="shape-chart-container">
            <div class="chart-container__head">
              <div class="title" id="shape-chart-plot-title"></div>
              <div class="shape-toolbar">
                <label class="shape-toggle" for="shape-viz-toggle" aria-label="Show Labels or Key"><span class="shape-toggle__label">Labels</span><span class="shape-toggle__track"><input type="checkbox" id="shape-viz-toggle" data-action="shape-viz-toggle" /><span class="shape-toggle__thumb" aria-hidden="true"></span></span><span class="shape-toggle__label">Key</span></label>
              </div>
            </div>
            <div class="chart-container__row">
              <div class="column-a">
                <div class="chart shape-chart-plot-wrap">
                  <svg
                    id="t-shape-svg"
                    viewBox="0 0 900 560"
                    preserveAspectRatio="xMidYMin meet"
                    role="img"
                    aria-label="Designer shape profile"
                  ></svg>
                </div>
              </div>
              <div class="column-b">
                <aside class="key-card shape-key-card" id="shape-key-card" hidden></aside>
              </div>
            </div>
          </div>
          <div class="shape-step5-actions">
            <section class="shape-export-card" aria-labelledby="shape-export-heading">
              <h3 id="shape-export-heading" class="shape-export-card__title">Export Options</h3>
              <div class="shape-export-card__buttons">
                <button
                  type="button"
                  data-action="download-png"
                  class="secondary btn-with-icon"
                  aria-label="Download PNG"
                >
                  <svg class="btn-with-icon__svg btn-with-icon__svg--download btn-download-icon" viewBox="0 0 256 256" aria-hidden="true">
                    <g class="btn-download-icon__layer">
                      <polyline
                        class="btn-download-icon__tray"
                        pathLength="100"
                        points="35 165.4 35 213.6 221 213.6 221 165.4"
                      />
                      <g class="btn-download-icon__arrow">
                        <line pathLength="100" x1="128" y1="26.6" x2="128" y2="165.4" />
                        <polyline class="btn-download-icon__chev" pathLength="100" points="64.5 106.1 128 169.5 191.5 106" />
                      </g>
                    </g>
                  </svg>
                  <span aria-hidden="true">PNG</span>
                </button>
                <button
                  type="button"
                  data-action="download-jpeg"
                  class="secondary btn-with-icon"
                  aria-label="Download JPEG"
                >
                  <svg class="btn-with-icon__svg btn-with-icon__svg--download btn-download-icon" viewBox="0 0 256 256" aria-hidden="true">
                    <g class="btn-download-icon__layer">
                      <polyline
                        class="btn-download-icon__tray"
                        pathLength="100"
                        points="35 165.4 35 213.6 221 213.6 221 165.4"
                      />
                      <g class="btn-download-icon__arrow">
                        <line pathLength="100" x1="128" y1="26.6" x2="128" y2="165.4" />
                        <polyline class="btn-download-icon__chev" pathLength="100" points="64.5 106.1 128 169.5 191.5 106" />
                      </g>
                    </g>
                  </svg>
                  <span aria-hidden="true">JPEG</span>
                </button>
                <button
                  type="button"
                  data-action="download-svg"
                  class="secondary btn-with-icon"
                  aria-label="Download SVG"
                >
                  <svg class="btn-with-icon__svg btn-with-icon__svg--download btn-download-icon" viewBox="0 0 256 256" aria-hidden="true">
                    <g class="btn-download-icon__layer">
                      <polyline
                        class="btn-download-icon__tray"
                        pathLength="100"
                        points="35 165.4 35 213.6 221 213.6 221 165.4"
                      />
                      <g class="btn-download-icon__arrow">
                        <line pathLength="100" x1="128" y1="26.6" x2="128" y2="165.4" />
                        <polyline class="btn-download-icon__chev" pathLength="100" points="64.5 106.1 128 169.5 191.5 106" />
                      </g>
                    </g>
                  </svg>
                  <span aria-hidden="true">SVG</span>
                </button>
              </div>
            </section>
            <section
              class="shape-primary-card"
              aria-label="Start over and email files"
            >
              <div class="shape-primary-actions">
                <button type="button" data-action="start-over" class="secondary btn-with-icon">
                  <svg class="btn-with-icon__svg btn-startover-icon" viewBox="0 0 256 256" aria-hidden="true">
                    <g class="btn-startover-icon__layer">
                      <path
                        class="btn-startover-icon__arc"
                        pathLength="100"
                        d="M139.8,212.4c46.6,0,84.4-37.8,84.4-84.4s-37.8-84.4-84.4-84.4S58.3,78.6,55.6,122.8"
                      />
                      <polyline class="btn-startover-icon__head" pathLength="100" points="31.9 93.4 54.7 128.2 82.2 102.5" />
                    </g>
                  </svg>
                  Start Over
                </button>
                <button type="button" data-action="email-files" class="secondary" disabled>
                  Email Files (ZIP)
                </button>
              </div>
            </section>
          </div>
          <div class="shape-email-wrap">
            <label for="shape-email" class="start-name-label">Email (Optional)</label>
            <input
              type="email"
              id="shape-email"
              class="start-name-input"
              name="shapeEmail"
              autocomplete="email"
              placeholder="e.g. alex@domain.com"
              maxlength="120"
            />
            <p class="start-email-note muted">
              Add an email here if you decide to have your shape files sent later. Will not be added to
              email list.
            </p>
          </div>
        </div>

        <section class="card shape-insights-card" id="shape-guide-card" aria-live="polite">
          <div class="shape-insights" id="shape-insights"></div>
        </section>
      </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" crossorigin="anonymous"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/tippy.js@6.3.7/dist/tippy-bundle.umd.min.js"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
