<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>T-Shaped | Designer Profile Mapper</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <h1>T-Shaped</h1>
        <p>Map your strengths, plot your design profile, and export it.</p>
      </header>

      <section class="stepper" aria-label="Progress">
        <div class="step-pill active" data-step="1">1. Start</div>
        <div class="step-pill" data-step="2">2. Profile</div>
        <div class="step-pill" data-step="3">3. Select</div>
        <div class="step-pill" data-step="4">4. Rate</div>
        <div class="step-pill" data-step="5">5. Visualize</div>
      </section>

      <section id="view" class="view" aria-live="polite"></section>
    </main>

    <template id="step1-template">
      <div class="card">
        <h2>Would you like to map your T-shape?</h2>
        <p class="muted">A quick 5-step flow to define your T-shaped designer profile.</p>
        <div class="actions">
          <button data-action="start-yes">Yes</button>
          <button data-action="start-no" class="secondary">No</button>
        </div>
        <p class="feedback hidden" id="start-no-feedback">
          No problem. You can start anytime from this screen.
        </p>
      </div>
    </template>

    <template id="step2-template">
      <div class="card">
        <h2>Do you identify as a generalist or specialist?</h2>
        <p class="muted">This determines your selection cap and ranking distribution.</p>
        <div class="stack">
          <label class="selectable">
            <input type="radio" name="profileType" value="generalist" />
            <span>
              <strong>Generalist</strong>
              <small>Up to 12 selected items</small>
            </span>
          </label>
          <label class="selectable">
            <input type="radio" name="profileType" value="specialist" />
            <span>
              <strong>Specialist</strong>
              <small>Up to 6 selected items</small>
            </span>
          </label>
        </div>
        <div class="actions">
          <button data-action="to-step-1" class="secondary">Back</button>
          <button data-action="to-step-3">Continue</button>
        </div>
      </div>
    </template>

    <template id="step3-template">
      <div class="card">
        <h2>Select skills & specialties</h2>
        <p class="muted" id="selection-cap"></p>
        <div class="selection-grid">
          <div>
            <h3>Design Categories</h3>
            <div id="categories-list" class="option-list"></div>
          </div>
          <div>
            <h3>Specializations</h3>
            <div id="specializations-list" class="option-list"></div>
          </div>
        </div>
        <div class="selected-summary" id="selected-summary"></div>
        <div class="actions">
          <button data-action="to-step-2" class="secondary">Back</button>
          <button data-action="to-step-4">Continue</button>
        </div>
      </div>
    </template>

    <template id="step4-template">
      <div class="card">
        <h2>Rate each selected skill</h2>
        <p class="muted">
          Drag score chips from the bank to each item. One score chip can only be used once.
        </p>
        <div class="rating-layout">
          <div>
            <h3>Your selected items</h3>
            <div id="selected-items" class="drop-zone-list"></div>
          </div>
          <div>
            <h3>Ranking bank</h3>
            <div id="ranking-bank" class="ranking-bank drop-target"></div>
          </div>
        </div>
        <div class="actions">
          <button data-action="to-step-3" class="secondary">Back</button>
          <button data-action="to-step-5">Plot T-shape</button>
        </div>
      </div>
    </template>

    <template id="step5-template">
      <div class="card">
        <h2>Your T-shaped profile</h2>
        <p class="muted">Highest scores are centered and the edges are varied automatically.</p>
        <div class="viz-wrap">
          <svg id="t-shape-svg" viewBox="0 0 900 700" role="img" aria-label="T-shaped skill map"></svg>
        </div>
        <div class="actions">
          <button data-action="to-step-4" class="secondary">Back</button>
          <button data-action="download-png">Download PNG</button>
          <button data-action="download-jpeg">Download JPEG</button>
          <button data-action="download-svg">Download SVG</button>
        </div>
      </div>
    </template>

    <script src="./script.js"></script>
  </body>
</html>
