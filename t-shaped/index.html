<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>T-Shaped | Designer Profile Mapper</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <h1>T-Shaped</h1>
        <p>Map your strengths, plot your design profile, and export it.</p>
      </header>

      <section class="stepper" aria-label="Progress">
        <div class="step-pill active" data-step="1">1. Start</div>
        <div class="step-pill" data-step="2">2. Profile</div>
        <div class="step-pill" data-step="3">3. Select</div>
        <div class="step-pill" data-step="4">4. Rank</div>
        <div class="step-pill" data-step="5">5. Shape</div>
      </section>

      <section id="view" class="view" aria-live="polite"></section>
    </main>

    <template id="step1-template">
      <div class="card card--start">
        <div class="start-hero">
          <div class="start-hero__text">
            <h2>Would you like to map your designer shape?</h2>
            <p class="muted">
              A short flow: pick generalist or specialist, choose skills, assign each a rank
              1–10 with the artwork icons, then get a top-aligned bar chart and a best-fit label:
              T, Pi, M, I, or X.
            </p>
          </div>
          <div class="start-hero__viz">
            <p class="demo-t-caption muted small">Preview (like your result)</p>
            <div
              class="demo-t-chart"
              id="demo-t-chart"
              role="img"
              aria-label="Example T-shaped profile with five bars"
            >
              <div class="demo-t-bar" style="--h-frac: 0.32; --d: 0.05s">
                <span class="demo-t-label">Strategy</span>
                <span class="demo-t-col"></span>
              </div>
              <div class="demo-t-bar" style="--h-frac: 0.38; --d: 0.1s">
                <span class="demo-t-label">Systems</span>
                <span class="demo-t-col"></span>
              </div>
              <div class="demo-t-bar demo-t-bar--stem" style="--h-frac: 1; --d: 0.15s">
                <span class="demo-t-label">Business ROI</span>
                <span class="demo-t-col"></span>
              </div>
              <div class="demo-t-bar" style="--h-frac: 0.35; --d: 0.2s">
                <span class="demo-t-label">A11y + ethics</span>
                <span class="demo-t-col"></span>
              </div>
              <div class="demo-t-bar" style="--h-frac: 0.3; --d: 0.25s">
                <span class="demo-t-label">Cross-func.</span>
                <span class="demo-t-col"></span>
              </div>
            </div>
            <p class="demo-t-hint muted small">
              <span class="demo-t-hint-desktop">Desktop: hover a bar to grow it and show the label.</span>
              <span class="demo-t-hint-mobile">Mobile: tap the chart once to show labels, again to hide.</span>
            </p>
          </div>
        </div>
        <div class="actions">
          <button data-action="start-yes">Yes</button>
          <button data-action="start-no" class="secondary">No</button>
        </div>
        <p class="feedback hidden" id="start-no-feedback">
          No problem. You can start anytime from this screen.
        </p>
      </div>
    </template>

    <template id="step2-template">
      <div class="card">
        <h2>Do you identify as a generalist or specialist?</h2>
        <p class="muted">This determines your selection cap and ranking distribution.</p>
        <div class="stack">
          <label class="selectable">
            <input type="radio" name="profileType" value="generalist" />
            <span>
              <strong>Generalist</strong>
              <small>Up to 12 selected items</small>
            </span>
          </label>
          <label class="selectable">
            <input type="radio" name="profileType" value="specialist" />
            <span>
              <strong>Specialist</strong>
              <small>Up to 6 selected items</small>
            </span>
          </label>
        </div>
        <div class="actions">
          <button data-action="to-step-1" class="secondary">Back</button>
          <button data-action="to-step-3">Continue</button>
        </div>
      </div>
    </template>

    <template id="step3-template">
      <div class="card card--scrollable">
        <div class="card-title-row">
          <h2>Select skills & specialties</h2>
          <button
            type="button"
            class="icon-btn"
            data-action="selection-reset"
            title="Clear all selections"
            aria-label="Clear all selections"
          >
            ⟲
          </button>
        </div>
        <p class="muted" id="selection-cap"></p>
        <div class="scroll-panel scroll-panel--main" id="selection-scroll">
          <div class="selection-grid">
            <div>
              <h3>Design Categories</h3>
              <div id="categories-list" class="option-list"></div>
            </div>
            <div>
              <h3>Specializations</h3>
              <div id="specializations-list" class="option-list"></div>
            </div>
          </div>
        </div>
        <div class="selected-summary" id="selected-summary"></div>
        <div class="actions">
          <button data-action="to-step-2" class="secondary">Back</button>
          <button data-action="to-step-4">Continue</button>
        </div>
      </div>
    </template>

    <template id="step4-template">
      <div class="card card--scrollable">
        <h2>Rate each selection</h2>
        <p class="muted">
          Tap a ranking icon (1–10). Your row picks up that icon’s colors. Each rank has a limited
          count — see the key. If a rank is full, you’ll snap to the nearest free value.
        </p>
        <div class="rating-layout">
          <div class="rating-col">
            <h3>Your selected items</h3>
            <div class="scroll-panel scroll-panel--main" id="rate-items-scroll">
              <div id="selected-items" class="slider-zone-list"></div>
            </div>
          </div>
          <div class="rating-col">
            <h3>Score availability</h3>
            <p class="muted small">How many of each score you can still use.</p>
            <div class="scroll-panel scroll-panel--side" id="rate-key-scroll">
              <div id="ranking-key-host" class="ranking-key-host"></div>
            </div>
          </div>
        </div>
        <div class="actions">
          <button data-action="to-step-3" class="secondary">Back</button>
          <button
            type="button"
            class="icon-btn"
            data-action="rate-start-over"
            title="Clear all scores"
            aria-label="Clear all scores"
          >
            ⟲
          </button>
          <button data-action="to-step-5">See your shape</button>
        </div>
      </div>
    </template>

    <template id="step5-template">
      <div class="card">
        <h2 id="shape-result-title">Your designer shape</h2>
        <p class="muted" id="shape-result-sub">Bars use your ranking colors (top-aligned).</p>
        <div class="viz-wrap">
          <svg id="t-shape-svg" viewBox="0 0 900 560" role="img" aria-label="Designer shape profile"></svg>
        </div>
        <div class="actions">
          <button data-action="to-step-4" class="secondary">Back</button>
          <button data-action="download-png">Download PNG</button>
          <button data-action="download-jpeg">Download JPEG</button>
          <button data-action="download-svg">Download SVG</button>
        </div>
      </div>
    </template>

    <script src="./script.js"></script>
  </body>
</html>
