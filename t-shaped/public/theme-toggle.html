<div class="toggle-button" id="theme-toggle" data-tippy-content="Switch between light and dark theme">
  <div id="light" class="state-anchor"></div>
  <div id="dark" class="state-anchor"></div>

  <a href="#dark" class="link-to-dark"></a>
  <a href="#light" class="link-to-light"></a>

  <div class="content">
    <div class="satallite">
      <div class="sun">
        <div class="moon">
          <div class="dot dot1"></div>
          <div class="dot dot2"></div>
          <div class="dot dot3"></div>
        </div>
      </div>
      <div class="rays">
        <div class="ray ray1"></div>
        <div class="ray ray2"></div>
      </div>
    </div>
    <div class="clouds">
      <div class="cloudset cloudset1">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
        <div class="cloud cloud4"></div>
        <div class="cloud cloud5"></div>
      </div>
      <div class="cloudset cloudset2">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
        <div class="cloud cloud4"></div>
        <div class="cloud cloud5"></div>
      </div>
    </div>
    <div class="stars">
      <div class="star star1"></div>
      <div class="star star2"></div>
      <div class="star star3"></div>
      <div class="star star4"></div>
      <div class="star star5"></div>
    </div>
  </div>
</div>
